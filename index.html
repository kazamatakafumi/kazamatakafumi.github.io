  .game{

    padding:18px 20px;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;

  .game:hover{
    transform:translateY(-2px);

    border-color:var(--accent);
  }
  .game:active{transform:translateY(0);}
  .game .icon{
    font-size:1.9rem;flex-shrink:0;
    width:52px;height:52px;
    display:flex;align-items:center;justify-content:center;

  }
  .game .meta{flex:1;min-width:0;}
  .game .name{font-size:1.15rem;font-weight:bold;line-height:1.3;}
  .game .desc{font-size:.86rem;color:var(--muted);margin-top:2px;}
  .game .go{
    flex-shrink:0;color:var(--accent);
    font-weight:bold;font-size:1.4rem;
  }

  .about{

  /* フッター */
  footer{
    margin-top:40px;text-align:center;
    font-size:.82rem;color:var(--muted);
